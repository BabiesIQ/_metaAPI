<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050f"/>
      <stop offset="50%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="70%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#38bdf8;#a78bfa;#818cf8" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Sweep gradient for shimmer effect -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="48%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="52%" stop-color="transparent"/>
      <stop offset="100%" stop-color="transparent"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="3 0" dur="3.5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Glow filter for title -->
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for wave bars -->
    <filter id="barGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Radial center glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#312e81" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)" rx="16"/>

  <!-- Center glow -->
  <ellipse cx="600" cy="160" rx="500" ry="200" fill="url(#centerGlow)"/>

  <!-- Shimmer overlay -->
  <rect width="1200" height="340" fill="url(#shimmer)" rx="16"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="68" x2="1200" y2="68"/>
    <line x1="0" y1="136" x2="1200" y2="136"/>
    <line x1="0" y1="204" x2="1200" y2="204"/>
    <line x1="0" y1="272" x2="1200" y2="272"/>
    <line x1="240" y1="0" x2="240" y2="340"/>
    <line x1="480" y1="0" x2="480" y2="340"/>
    <line x1="720" y1="0" x2="720" y2="340"/>
    <line x1="960" y1="0" x2="960" y2="340"/>
  </g>

  <!-- Floating particles (left side) -->
  <g opacity="0.5">
    <circle cx="60" cy="80" r="2" fill="#818cf8">
      <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="200" r="1.5" fill="#38bdf8">
      <animate attributeName="cy" values="200;180;200" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="260" r="1" fill="#a78bfa">
      <animate attributeName="cy" values="260;240;260" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating particles (right side) -->
  <g opacity="0.5">
    <circle cx="1140" cy="100" r="2" fill="#38bdf8">
      <animate attributeName="cy" values="100;80;100" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="240" r="1.5" fill="#818cf8">
      <animate attributeName="cy" values="240;220;240" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1160" cy="280" r="1" fill="#a78bfa">
      <animate attributeName="cy" values="280;260;280" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Left decorative code text -->
  <g font-family="JetBrains Mono, Consolas, monospace" font-size="11" fill="#4f46e5" opacity="0.35">
    <text x="28" y="130">GET /api/song</text>
    <text x="28" y="150">X-API-Key: biq_***</text>
    <text x="28" y="170">→ stream_url</text>
  </g>

  <!-- Right decorative code text -->
  <g font-family="JetBrains Mono, Consolas, monospace" font-size="11" fill="#0369a1" opacity="0.35" text-anchor="end">
    <text x="1172" y="130">POST /api/search</text>
    <text x="1172" y="150">{"query": "..."}</text>
    <text x="1172" y="170">→ results[]</text>
  </g>

  <!-- API LIVE badge (top right) -->
  <g>
    <rect x="1060" y="22" width="108" height="26" rx="13" fill="#052e16" stroke="#16a34a" stroke-width="1"/>
    <circle cx="1081" cy="35" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="1091" y="40" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#22c55e" letter-spacing="1">API LIVE</text>
  </g>

  <!-- Version badge (top left) -->
  <rect x="26" y="22" width="72" height="26" rx="13" fill="#1e1b4b" stroke="#4f46e5" stroke-width="1"/>
  <text x="62" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#818cf8">v 1.0.0</text>

  <!-- Main title: BabiesIQ -->
  <text x="600" y="138"
    font-family="Inter, SF Pro Display, -apple-system, sans-serif"
    font-size="72"
    font-weight="800"
    text-anchor="middle"
    letter-spacing="-1"
    fill="url(#titleGrad)"
    filter="url(#glow)">BabiesIQ</text>

  <!-- Subtitle -->
  <text x="600" y="173"
    font-family="Inter, sans-serif"
    font-size="17"
    font-weight="500"
    text-anchor="middle"
    letter-spacing="3"
    fill="#94a3b8">YOUTUBE MEDIA STREAMING API</text>

