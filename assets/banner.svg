      <rect x="242" y="0" width="7" height="12" rx="3.5"><animate attributeName="height" values="12;38;20;40;12" dur="1.15s" repeatCount="indefinite" begin="0.80s"/><animate attributeName="y" values="28;2;20;0;28"  dur="1.15s" repeatCount="indefinite" begin="0.80s"/></rect>
      <rect x="253" y="0" width="7" height="40" rx="3.5" fill="#818cf8"><animate attributeName="height" values="40;16;36;8;40"  dur="0.95s" repeatCount="indefinite" begin="0.72s"/><animate attributeName="y" values="0;24;4;32;0"   dur="0.95s" repeatCount="indefinite" begin="0.72s"/></rect>
