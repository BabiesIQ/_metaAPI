<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050f"/>
      <stop offset="50%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="70%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#38bdf8;#a78bfa;#818cf8" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Sweep gradient for shimmer effect -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="48%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="52%" stop-color="transparent"/>
      <stop offset="100%" stop-color="transparent"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="3 0" dur="3.5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Glow filter for title -->
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for wave bars -->
    <filter id="barGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Radial center glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#312e81" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)" rx="16"/>

  <!-- Center glow -->
  <ellipse cx="600" cy="160" rx="500" ry="200" fill="url(#centerGlow)"/>

  <!-- Shimmer overlay -->
  <rect width="1200" height="340" fill="url(#shimmer)" rx="16"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="68" x2="1200" y2="68"/>
    <line x1="0" y1="136" x2="1200" y2="136"/>
    <line x1="0" y1="204" x2="1200" y2="204"/>
    <line x1="0" y1="272" x2="1200" y2="272"/>
    <line x1="240" y1="0" x2="240" y2="340"/>
    <line x1="480" y1="0" x2="480" y2="340"/>
    <line x1="720" y1="0" x2="720" y2="340"/>
    <line x1="960" y1="0" x2="960" y2="340"/>
  </g>

  <!-- Floating particles (left side) -->
  <g opacity="0.5">
    <circle cx="60" cy="80" r="2" fill="#818cf8">
      <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="200" r="1.5" fill="#38bdf8">
      <animate attributeName="cy" values="200;180;200" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="260" r="1" fill="#a78bfa">
      <animate attributeName="cy" values="260;240;260" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating particles (right side) -->
  <g opacity="0.5">
    <circle cx="1140" cy="100" r="2" fill="#38bdf8">
      <animate attributeName="cy" values="100;80;100" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="220" r="1.5" fill="#818cf8">
      <animate attributeName="cy" values="220;200;220" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1160" cy="280" r="1" fill="#a78bfa">
      <animate attributeName="cy" values="280;260;280" dur="5.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main title: BabiesIQ -->
  <text x="600" y="118" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="64" font-weight="800" letter-spacing="-2"
        fill="url(#titleGrad)" filter="url(#glow)">BabiesIQ</text>

  <!-- Subtitle -->
  <text x="600" y="152" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="16" font-weight="400" letter-spacing="3"
        fill="#64748b">DEVELOPER API · STREAM · SEARCH · DOWNLOAD</text>

  <!-- Animated waveform bars -->
  <g transform="translate(600,190)" filter="url(#barGlow)">
    <g transform="translate(-220,0)" fill="#6366f1" opacity="0.85">
      <rect x="0"   y="0" width="7" height="28" rx="3.5"><animate attributeName="height" values="28;12;36;8;28"  dur="1.1s" repeatCount="indefinite" begin="0s"/><animate attributeName="y" values="12;28;4;32;12" dur="1.1s" repeatCount="indefinite" begin="0s"/></rect>
      <rect x="11"  y="0" width="7" height="40" rx="3.5" fill="#818cf8"><animate attributeName="height" values="40;16;28;10;40" dur="0.9s" repeatCount="indefinite" begin="0.1s"/><animate attributeName="y" values="0;24;12;30;0"  dur="0.9s" repeatCount="indefinite" begin="0.1s"/></rect>
      <rect x="22"  y="0" width="7" height="20" rx="3.5"><animate attributeName="height" values="20;38;10;36;20" dur="1.3s" repeatCount="indefinite" begin="0.2s"/><animate attributeName="y" values="20;2;30;4;20"  dur="1.3s" repeatCount="indefinite" begin="0.2s"/></rect>
      <rect x="33"  y="0" width="7" height="36" rx="3.5" fill="#38bdf8"><animate attributeName="height" values="36;10;40;14;36" dur="1.0s" repeatCount="indefinite" begin="0.3s"/><animate attributeName="y" values="4;30;0;26;4"   dur="1.0s" repeatCount="indefinite" begin="0.3s"/></rect>
      <rect x="44"  y="0" width="7" height="16" rx="3.5"><animate attributeName="height" values="16;36;8;40;16"  dur="1.2s" repeatCount="indefinite" begin="0.4s"/><animate attributeName="y" values="24;4;32;0;24"  dur="1.2s" repeatCount="indefinite" begin="0.4s"/></rect>
      <rect x="55"  y="0" width="7" height="32" rx="3.5" fill="#a78bfa"><animate attributeName="height" values="32;14;40;10;32" dur="0.85s" repeatCount="indefinite" begin="0.5s"/><animate attributeName="y" values="8;26;0;30;8"   dur="0.85s" repeatCount="indefinite" begin="0.5s"/></rect>
      <rect x="66"  y="0" width="7" height="24" rx="3.5"><animate attributeName="height" values="24;40;12;36;24" dur="1.15s" repeatCount="indefinite" begin="0.6s"/><animate attributeName="y" values="16;0;28;4;16"  dur="1.15s" repeatCount="indefinite" begin="0.6s"/></rect>
      <rect x="77"  y="0" width="7" height="40" rx="3.5" fill="#818cf8"><animate attributeName="height" values="40;18;32;8;40"  dur="1.0s" repeatCount="indefinite" begin="0.7s"/><animate attributeName="y" values="0;22;8;32;0"   dur="1.0s" repeatCount="indefinite" begin="0.7s"/></rect>
      <rect x="88"  y="0" width="7" height="14" rx="3.5"><animate attributeName="height" values="14;36;6;40;14"  dur="1.3s" repeatCount="indefinite" begin="0.8s"/><animate attributeName="y" values="26;4;34;0;26"  dur="1.3s" repeatCount="indefinite" begin="0.8s"/></rect>
      <rect x="99"  y="0" width="7" height="38" rx="3.5" fill="#38bdf8"><animate attributeName="height" values="38;12;40;16;38" dur="0.95s" repeatCount="indefinite" begin="0.9s"/><animate attributeName="y" values="2;28;0;24;2"   dur="0.95s" repeatCount="indefinite" begin="0.9s"/></rect>
      <rect x="110" y="0" width="7" height="22" rx="3.5"><animate attributeName="height" values="22;40;10;34;22" dur="1.1s" repeatCount="indefinite" begin="1.0s"/><animate attributeName="y" values="18;0;30;6;18"  dur="1.1s" repeatCount="indefinite" begin="1.0s"/></rect>
      <rect x="121" y="0" width="7" height="36" rx="3.5" fill="#6366f1"><animate attributeName="height" values="36;8;40;20;36"  dur="1.25s" repeatCount="indefinite" begin="1.1s"/><animate attributeName="y" values="4;32;0;20;4"   dur="1.25s" repeatCount="indefinite" begin="1.1s"/></rect>
      <rect x="132" y="0" width="7" height="18" rx="3.5"><animate attributeName="height" values="18;38;8;36;18"  dur="0.9s" repeatCount="indefinite" begin="1.2s"/><animate attributeName="y" values="22;2;32;4;22"  dur="0.9s" repeatCount="indefinite" begin="1.2s"/></rect>
      <rect x="143" y="0" width="7" height="40" rx="3.5" fill="#a78bfa"><animate attributeName="height" values="40;14;36;10;40" dur="1.05s" repeatCount="indefinite" begin="1.3s"/><animate attributeName="y" values="0;26;4;30;0"   dur="1.05s" repeatCount="indefinite" begin="1.3s"/></rect>
      <rect x="154" y="0" width="7" height="26" rx="3.5"><animate attributeName="height" values="26;40;14;38;26" dur="1.2s" repeatCount="indefinite" begin="1.4s"/><animate attributeName="y" values="14;0;26;2;14"  dur="1.2s" repeatCount="indefinite" begin="1.4s"/></rect>
      <rect x="165" y="0" width="7" height="12" rx="3.5" fill="#38bdf8"><animate attributeName="height" values="12;40;8;36;12"  dur="1.0s" repeatCount="indefinite" begin="1.5s"/><animate attributeName="y" values="28;0;32;4;28"  dur="1.0s" repeatCount="indefinite" begin="1.5s"/></rect>
      <rect x="176" y="0" width="7" height="34" rx="3.5"><animate attributeName="height" values="34;10;40;18;34" dur="0.88s" repeatCount="indefinite" begin="1.6s"/><animate attributeName="y" values="6;30;0;22;6"   dur="0.88s" repeatCount="indefinite" begin="1.6s"/></rect>
      <rect x="187" y="0" width="7" height="40" rx="3.5" fill="#818cf8"><animate attributeName="height" values="40;20;30;10;40" dur="1.15s" repeatCount="indefinite" begin="1.7s"/><animate attributeName="y" values="0;20;10;30;0"  dur="1.15s" repeatCount="indefinite" begin="1.7s"/></rect>
      <rect x="198" y="0" width="7" height="20" rx="3.5" fill="#6366f1"><animate attributeName="height" values="20;38;10;40;20" dur="1.3s" repeatCount="indefinite" begin="1.8s"/><animate attributeName="y" values="20;2;30;0;20"  dur="1.3s" repeatCount="indefinite" begin="1.8s"/></rect>
      <rect x="209" y="0" width="7" height="30" rx="3.5"><animate attributeName="height" values="30;10;40;18;30" dur="1.1s" repeatCount="indefinite" begin="1.9s"/><animate attributeName="y" values="10;30;0;22;10" dur="1.1s" repeatCount="indefinite" begin="1.9s"/></rect>
      <rect x="220" y="0" width="7" height="40" rx="3.5"><animate attributeName="height" values="8;40;16;32;8"   dur="1.2s" repeatCount="indefinite" begin="0s"/><animate attributeName="y" values="32;0;24;8;32"  dur="1.2s" repeatCount="indefinite" begin="0s"/></rect>
      <rect x="231" y="0" width="7" height="20" rx="3.5" fill="#38bdf8"><animate attributeName="height" values="20;36;8;40;20"  dur="1.15s" repeatCount="indefinite" begin="0.28s"/><animate attributeName="y" values="20;4;32;0;20"  dur="1.15s" repeatCount="indefinite" begin="0.28s"/></rect>
      <rect x="242" y="0" width="7" height="38" rx="3.5" fill="#818cf8"><animate attributeName="height" values="38;14;40;10;38" dur="1.0s" repeatCount="indefinite" begin="0.52s"/><animate attributeName="y" values="2;26;0;30;2"   dur="1.0s" repeatCount="indefinite" begin="0.52s"/></rect>
      <rect x="253" y="0" width="7" height="10" rx="3.5"><animate attributeName="height" values="10;38;22;36;10"  dur="1.25s" repeatCount="indefinite" begin="0.76s"/><animate attributeName="y" values="30;2;18;4;30"  dur="1.25s" repeatCount="indefinite" begin="0.76s"/></rect>
      <rect x="264" y="0" width="7" height="30" rx="3.5" fill="#a78bfa"><animate attributeName="height" values="30;8;40;16;30"  dur="1.35s" repeatCount="indefinite" begin="1.0s"/><animate attributeName="y" values="10;32;0;24;10" dur="1.35s" repeatCount="indefinite" begin="1.0s"/></rect>
    </g>
  </g>

  <!-- API LIVE badge (top right) -->
  <g transform="translate(1060, 28)">
    <rect width="112" height="28" rx="14" fill="#052e1c" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="18" cy="14" r="5" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="58" y="19" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#22c55e" letter-spacing="1">API LIVE</text>
  </g>

  <!-- Bottom badge row: SDK language badges -->
  <g transform="translate(0, 270)" font-family="Inter, sans-serif" font-size="12" font-weight="600">
    <!-- Python -->
    <rect x="310" y="0" width="82" height="24" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" opacity="0.85"/>
    <text x="351" y="16" text-anchor="middle" fill="#93c5fd">Python SDK</text>

    <!-- JavaScript -->
    <rect x="402" y="0" width="100" height="24" rx="12" fill="#3f2a00" stroke="#ca8a04" stroke-width="1" opacity="0.85"/>
    <text x="452" y="16" text-anchor="middle" fill="#fcd34d">JavaScript SDK</text>

    <!-- Go -->
    <rect x="512" y="0" width="66" height="24" rx="12" fill="#052e1c" stroke="#16a34a" stroke-width="1" opacity="0.85"/>
    <text x="545" y="16" text-anchor="middle" fill="#86efac">Go SDK</text>

    <!-- PHP -->
    <rect x="588" y="0" width="72" height="24" rx="12" fill="#2d1b6e" stroke="#7c3aed" stroke-width="1" opacity="0.85"/>
    <text x="624" y="16" text-anchor="middle" fill="#c4b5fd">PHP SDK</text>

    <!-- CLI -->
    <rect x="670" y="0" width="58" height="24" rx="12" fill="#1a1a2e" stroke="#6366f1" stroke-width="1" opacity="0.85"/>
    <text x="699" y="16" text-anchor="middle" fill="#818cf8">CLI Tool</text>

    <!-- Telegram -->
    <rect x="738" y="0" width="110" height="24" rx="12" fill="#0a1628" stroke="#2CA5E0" stroke-width="1" opacity="0.85"/>
    <text x="793" y="16" text-anchor="middle" fill="#7dd3fc">@BabiesIQ</text>
  </g>

  <!-- Bottom label: removed babyapi.pro, kept only core links -->
  <text x="600" y="318" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="1">
    <tspan fill="#475569">babiesiq.tech</tspan>
    <tspan fill="#334155"> · </tspan>
    <tspan fill="#475569">api.babiesiq.tech</tspan>
    <tspan fill="#334155"> · </tspan>
    <tspan fill="#2CA5E0">t.me/BabiesIQ</tspan>
  </text>

  <!-- Border -->
  <rect width="1200" height="340" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" rx="16" opacity="0.7"/>
</svg>
