      <rect x="198" y="0" width="7" height="40" rx="3.5"><animate attributeName="height" values="40;18;28;10;40" dur="1.0s" repeatCount="indefinite" begin="1.12s"/><animate attributeName="y" values="0;22;12;30;0"  dur="1.0s" repeatCount="indefinite" begin="1.12s"/></rect>
      <rect x="209" y="0" width="7" height="34" rx="3.5" fill="#38bdf8"><animate attributeName="height" values="34;12;40;20;34" dur="1.35s" repeatCount="indefinite" begin="1.04s"/><animate attributeName="y" values="6;28;0;20;6"   dur="1.35s" repeatCount="indefinite" begin="1.04s"/></rect>
