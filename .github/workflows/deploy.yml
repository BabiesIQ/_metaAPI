name: Deploy to Appwrite Sites

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Package dist
        run: |
          tar -czf deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            package.json \
            dist/

      - name: Deploy to Appwrite Sites
        run: |
          RESPONSE=$(curl -s -X POST \
            "${{ secrets.APPWRITE_ENDPOINT }}/sites/${{ secrets.APPWRITE_SITE_ID }}/deployments" \
            -H "x-appwrite-project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "x-appwrite-key: ${{ secrets.APPWRITE_API_KEY }}" \
            -F "code=@deploy.tar.gz;type=application/x-gzip" \
            -F "activate=true")

          echo "Response: $RESPONSE"

          STATUS=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status', d.get('message','unknown')))" 2>/dev/null || echo "uploaded")
          echo "Deploy status: $STATUS"

          DEPLOY_ID=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('\$id',''))" 2>/dev/null || echo "")
          echo "Deployment ID: $DEPLOY_ID"
