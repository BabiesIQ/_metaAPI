name: Deploy to Appwrite Sites

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Package for deployment
        run: |
          tar -czf deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            package.json \
            dist/

      - name: Deploy to Appwrite Sites
        run: |
          RESPONSE=$(curl -s -X POST \
            "${{ secrets.APPWRITE_ENDPOINT }}/sites/${{ secrets.APPWRITE_SITE_ID }}/deployments" \
            -H "x-appwrite-project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "x-appwrite-key: ${{ secrets.APPWRITE_API_KEY }}" \
            -F "code=@deploy.tar.gz;type=application/x-gzip" \
            -F "activate=true")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          status = d.get('status', d.get('message', 'unknown'))
          print(f'Deploy status: {status}')
          if 'message' in d and d.get('code'):
            print(f'ERROR: {d[\"message\"]}')
            sys.exit(1)
          "
