name: Deploy to Appwrite Sites

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package source for deployment
        run: tar -czf deploy.tar.gz --exclude=node_modules --exclude=.git --exclude=deploy.tar.gz .

      - name: Deploy to Appwrite Sites
        env:
          ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          SITE_ID: ${{ secrets.APPWRITE_SITE_ID }}
          PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          RESPONSE=$(curl -s -X POST "${ENDPOINT}/sites/${SITE_ID}/deployments" \
            -H "x-appwrite-project: ${PROJECT_ID}" \
            -H "x-appwrite-key: ${API_KEY}" \
            -F "code=@deploy.tar.gz;type=application/x-gzip" \
            -F "activate=true")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Status:', d.get('status', d.get('message','?'))); sys.exit(1 if d.get('code') else 0)"
